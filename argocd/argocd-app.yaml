apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: golang-backend-app
  namespace: argocd
  labels:
    app: golang-backend
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Source repository containing your Kubernetes manifests
  source:
    repoURL: https://github.com/Alero-Awani/Region-Simulator
    targetRevision: HEAD
    path: golang-backend

  # Destination cluster and namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: backend

  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # # Health check and status
  # revisionHistoryLimit: 10

  # # Ignore differences for certain fields
  # ignoreDifferences:
  #   - group: apps
  #     kind: Deployment
  #     jsonPointers:
  #       - /spec/replicas
